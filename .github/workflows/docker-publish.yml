name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
      JIRA_DOMAIN: ${{ secrets.DOMAIN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image locally
        run: |
          docker build -t "$IMAGE_NAME:local" .

      - name: Test built image
        run: |
          docker run -d --rm \
            --name jira-worklog-test \
            -e PORT=8080 \
            -e JIRA_DOMAIN="$JIRA_DOMAIN" \
            -p 8080:8080 \
            "$IMAGE_NAME:local"

          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          docker logs jira-worklog-test
          exit 1

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push image
        run: |
          docker tag "$IMAGE_NAME:local" "$IMAGE_NAME:latest"
          docker tag "$IMAGE_NAME:local" "$IMAGE_NAME:${{ github.sha }}"
          docker push "$IMAGE_NAME:latest"
          docker push "$IMAGE_NAME:${{ github.sha }}"

  deploy:
    needs: build-test-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: SSH and run deploy.sh
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: IMAGE_NAME,DOMAIN
          script: |
            export IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}"
            export DOMAIN="${{ secrets.DOMAIN }}"
            cd /root
            ./jira-deploy.sh